<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLARSON | System Upgrade</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 84 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='27.5' width='12' height='45' fill='%230B0D0E'/%3E%3Crect x='24' y='0' width='12' height='100' fill='%230B0D0E'/%3E%3Crect x='48' y='15' width='12' height='70' fill='%230B0D0E'/%3E%3Crect x='72' y='35' width='12' height='30' fill='%230B0D0E'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.1/500.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.1/300.css">

    <style>
        :root {
            --logo-ink: #0B0D0E;
            --logo-paper: #F7F6F2;
            --logo-amber: #E8B23A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Geist Sans', sans-serif;
            /* Fondo elegante: Base de papel con un sutil foco de luz ámbar arriba */
            background-color: var(--logo-paper);
            background-image: radial-gradient(circle at 50% -20%, rgba(232, 178, 58, 0.15), transparent 65%);
            color: var(--logo-ink);
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo Alineado Perfectamente */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .brand-mark { 
            height: 52px; 
            width: auto; 
            display: block;
        }

        .brand-name {
            font-size: 40px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            line-height: 1; 
            margin-top: 4px; 
        }

        /* Textos Principales */
        h1 {
            font-size: 3.8rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            color: #555;
            margin-bottom: 60px;
            max-width: 600px;
        }

        /* Contador con Segundos */
        .timer {
            display: flex;
            gap: 50px;
            justify-content: center;
            margin-bottom: 90px;
        }

        .unit { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-width: 80px; 
        }

        .val { 
            font-size: 4.5rem; 
            font-weight: 300; 
            line-height: 1; 
            color: var(--logo-ink); 
            font-variant-numeric: tabular-nums; 
        }

        .lab { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 12px; 
            color: #888;
        }

        /* Pie de página Limpio */
        .footer-note {
            width: 100%;
            max-width: 700px;
            padding-top: 30px;
            border-top: 1px solid rgba(11, 13, 14, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .philosophy {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .meta-info {
            font-size: 0.8rem;
            color: #777;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .timer { gap: 20px; }
            .val { font-size: 3rem; }
            .footer-note { 
                flex-direction: column; 
                gap: 15px; 
                text-align: center; 
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo">
            <svg class="brand-mark" viewBox="0 0 84 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="27.5" width="12" height="45" fill="var(--logo-ink)"/>
                <rect x="24" y="0" width="12" height="100" fill="var(--logo-amber)"/>
                <rect x="48" y="15" width="12" height="70" fill="var(--logo-ink)"/>
                <rect x="72" y="35" width="12" height="30" fill="var(--logo-ink)"/>
            </svg>
            <span class="brand-name">KLARSON</span>
        </div>

        <h1>Refining our infrastructure.</h1>
        <p class="tagline">We are currently making essential upgrades to deliver absolute clarity. All systems will resume in:</p>

        <div class="timer">
            <div class="unit">
                <span class="val" id="d">00</span>
                <span class="lab">Days</span>
            </div>
            <div class="unit">
                <span class="val" id="h">00</span>
                <span class="lab">Hours</span>
            </div>
            <div class="unit">
                <span class="val" id="m">00</span>
                <span class="lab">Minutes</span>
            </div>
            <div class="unit">
                <span class="val" id="s">00</span>
                <span class="lab">Seconds</span>
            </div>
        </div>

        <div class="footer-note">
            <span class="philosophy">Engineered for sound. Built for scale.</span>
            <span class="meta-info">© 2026 KLARSON</span>
        </div>
    </div>

    <script>
        // Fecha objetivo: Miércoles 22 de Abril, 17:00 hora de Rumania (UTC+3)
        const target = new Date("2026-04-22T17:00:00+03:00").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            } else {
                document.querySelector('h1').innerText = "CLARITY HAS ARRIVED.";
                document.querySelector('.tagline').innerText = "The infrastructure upgrades are complete.";
                document.querySelector('.timer').style.display = 'none';
            }
        }
        
        setInterval(update, 1000);
        update();
    </script>

</body>
</html>
